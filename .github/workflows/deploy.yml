name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [scraped]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download Scraped Data
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: car-data
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate static site
        run: pnpm generate
        env:
          NODE_ENV: production

      - name: Copy cars to output
        run: |
          mkdir -p .output/public
          [ -f public/cars.json ] && cp public/cars.json .output/public/cars.json || true
          mkdir -p .output/public/_content/cars
          cp -r content/cars/* .output/public/_content/cars/ || true

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .output/public
