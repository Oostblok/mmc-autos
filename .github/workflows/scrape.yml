name: Car scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Install Chrome
        run: |
          sudo apt-get install -y google-chrome-stable
          echo "PUPPETEER_EXECUTABLE_PATH=$(which google-chrome-stable)" >> $GITHUB_ENV

      - name: Verify Chrome
        run: |
          echo "Chrome path: $PUPPETEER_EXECUTABLE_PATH"
          $PUPPETEER_EXECUTABLE_PATH --version
          echo "Chrome exists: $(test -f $PUPPETEER_EXECUTABLE_PATH && echo YES || echo NO)"

      - name: Clear old scraped data
        run: |
          mkdir -p content/cars
          rm -rf content/cars/*

      - name: Scrape data
        run: pnpm scrape

      - name: Upload Scraped Data
        uses: actions/upload-artifact@v4
        with:
          name: car-data
          path: | 
            public/cars.json
            content/cars/
          retention-days: 2

      - name: Signal deploy
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d "{\"event_type\": \"scraped\", \"client_payload\": {\"run_id\": \"${{ github.run_id }}\"}}"
