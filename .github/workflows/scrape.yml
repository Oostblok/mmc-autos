name: Car scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Install browser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 || sudo apt-get install -y \
            libasound2

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install Chrome (Puppeteer)
        run: pnpm exec puppeteer browsers install chrome

      - name: Clear old scraped data
        run: |
          mkdir -p content/cars
          rm -rf content/cars/*

      - name: Scrape data
        run: pnpm scrape

      - name: Upload Scraped Data
        uses: actions/upload-artifact@v4
        with:
          name: car-data
          path: |
            public/cars.json
            content/cars/
          retention-days: 2

      - name: Signal deploy
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d "{\"event_type\": \"scraped\", \"client_payload\": {\"run_id\": \"${{ github.run_id }}\"}}"
