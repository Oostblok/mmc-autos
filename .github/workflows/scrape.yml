name: Car scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    permissions:
      contents: write
      actions: write

    env:
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    steps:
      - uses: actions/checkout@v4

      - name: Install Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 || sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Cache Puppeteer
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PUPPETEER_CACHE_DIR }}
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Clear old scraped data
        run: |
          mkdir -p content/cars
          rm -rf content/cars/*

      - name: Install Chrome Binary
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: pnpm exec puppeteer browsers install chrome

      - name: Scrape data
        run: pnpm scrape

      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-debug
          path: error-screenshot.png
          retention-days: 1

      - name: Upload Scraped Data
        uses: actions/upload-artifact@v4
        with:
          name: car-data
          path: | 
            public/cars.json
            content/cars/
          retention-days: 2

      - name: Signal deploy
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d "{\"event_type\": \"scraped\", \"client_payload\": {\"run_id\": \"${{ github.run_id }}\"}}"
